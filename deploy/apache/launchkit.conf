<VirtualHost *:80>
    ServerName launchkit.your-domain.com
    ServerAdmin webmaster@your-domain.com

    DocumentRoot /var/www/launchkit/public

    <Directory /var/www/launchkit/public>
        AllowOverride All
        Require all granted
        Options FollowSymLinks
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/launchkit-error.log
    CustomLog ${APACHE_LOG_DIR}/launchkit-access.log combined
</VirtualHost>

